!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Object Detection</title>

    <!-- TensorFlow -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #222;
            color: white;
        }

        .video-container {
            position: relative;
            display: inline-block;
            margin-top: 20px;
        }

        video, canvas {
            border-radius: 10px;
            max-width: 100%;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        #descriptionBox {
            margin-top: 15px;
            padding: 12px;
            width: 640px;
            max-width: 95%;
            background: #111;
            border-radius: 8px;
            font-size: 18px;
            color: yellow;
            text-align: center;
        }
    </style>
</head>

<body>

<h2>Live Object Detection</h2>

<div class="video-container">
    <video id="webcam" autoplay playsinline muted width="640" height="480"></video>
    <canvas id="canvas"></canvas>
</div>

<!-- 👇 TEXT OUTPUT BELOW VIDEO -->
<div id="descriptionBox">Analyzing scene...</div>

<!-- Link JS -->
<script src="script.js"></script>

</body>
</html>
